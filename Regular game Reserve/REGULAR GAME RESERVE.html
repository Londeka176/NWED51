<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://kit.fontawesome.com/3ef9ebe41d.js" crossorigin="anonymous"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regular Game Reserve</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #E1D8B2;
      height: 100%;
      color: white;
      font-family: "Arial", "Helvetica", sans-serif;
    }

    .hero {
      height: 100vh;
      background: url("7.jpg") no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    
      }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      background: #b4c369;
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      border-radius: 5px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #8838;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 1rem;
    }

    nav a:hover {
      box-shadow: 2px -1px 2px black;
    }

    
  </style>
</head>

<body>

  <header>
   <i class="fa-solid fa-paw"></i>
    <nav>
      <a href="Home Page.html"><i class="fa-solid fa-house"></i></a>

      <a href="About Page.html"><i class="fa-solid fa-circle-info"></i></a>

      <a href="Gallery.html"><i class="fa-solid fa-image"></i></a>

      <a href="Form.html"><i class="fa-brands fa-wpforms"></i></a>
    </nav>
  </header>

  <section class="hero">
    <div class="overlay"></div>
    <div class="content">
      <h1>Regular Game Reserve</h1>
      <p>Experience the beauty of wildlife and nature</p>
    </div>
  </section>
  
<footer>
<center><p>@ 2026 Regular Game Reserve | Protecting Wildlife</p></center>
</footer>		 

</body>

</html>
